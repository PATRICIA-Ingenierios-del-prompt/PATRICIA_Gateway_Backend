apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: patricia-app
  labels: { app: gateway }
spec:
  replicas: {{ .Values.replicaCount }}
  # Gateway holds long-lived WebSocket tunnels (location-ws, notification-ws):
  # a plain rolling update (default 25%/25%) can pull down old pods before new
  # ones are serving, dropping open tunnels. maxUnavailable: 0 forbids that;
  # maxSurge: 1 rolls one extra pod at a time instead of a whole batch.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      serviceAccountName: gateway
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: gateway-config }
            - secretRef:    { name: gateway-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
