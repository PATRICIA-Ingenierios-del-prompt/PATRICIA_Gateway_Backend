# Pulls the single secret Gateway needs from AWS Secrets Manager into a
# native K8s Secret (gateway-secrets) that the Deployment mounts via envFrom.
# Same remote entry Auth's chart writes JWT_SECRET from — Gateway only
# verifies signatures, it never mints tokens, so it needs no entries of its own.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
