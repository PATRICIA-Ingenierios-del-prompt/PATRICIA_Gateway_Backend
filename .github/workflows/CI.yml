name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]


permissions:
  contents: read
  pull-requests: read

env:
  # Debe coincidir con el path del repo ECR: <registry>/patricia-dev/gateway
  # (los repos ECR se llaman "${project}-${env}/${service}" = "patricia-dev/gateway").
  IMAGE_NAME: patricia-dev/gateway

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compiles, runs the unit + context tests and packages the jar.
      # The Spring context test reads jwt.secret / gateway.services.* from
      # src/test/resources/application.yml — no external services needed.
      # Enforces coverage generation for SonarCloud (-Pcoverage).
      - name: Build & test
        run: mvn -B clean verify -Pcoverage

      # -------------------------------------------------------------------------
      # SonarCloud quality gate. Enable once the SonarCloud project + secrets
      # are configured. A failing quality gate blocks the PR into develop.
      # -------------------------------------------------------------------------
      - name: Sonar analysis (branch)
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/GatewayApplication.java" \
            -Dsonar.coverage.exclusions="**/GatewayApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**"

      - name: Sonar analysis (pull request)
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/GatewayApplication.java" \
            -Dsonar.coverage.exclusions="**/GatewayApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # On PRs we only verify the Dockerfile still builds; the real image is
      # built and pushed by the push-image job on develop/main.
      - name: Build Docker image (verify Dockerfile works)
        if: github.event_name == 'pull_request'
        run: docker build -t ${{ env.IMAGE_NAME }}:ci .

  # ---------------------------------------------------------------------------
  # CI (§1.2): push the image to ECR on every push to develop/main.
  # Credentials come from GitHub OIDC -> AWS role; no static keys anywhere.
  # ---------------------------------------------------------------------------
  push-image:
    needs: build-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for configure-aws-credentials
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE:${{ steps.meta.outputs.tag }} .
          docker push $IMAGE:${{ steps.meta.outputs.tag }}

  # ---------------------------------------------------------------------------
  # CD (§1.3): deploy to EKS on push to main ONLY.
  # `helm upgrade --wait` + readiness probes gate the rollout: if the new pods
  # never go ready, this job FAILS and the old ReplicaSet keeps serving.
  # Because rollingUpdate.maxUnavailable is 0 (see deploy/templates/deployment.yaml),
  # the old pods — and their open WS tunnels — stay up until the new ones pass
  # readiness, so this is safe to run without draining active tunnels first.
  # Manual rollback: helm rollback gateway -n patricia-app
  # ---------------------------------------------------------------------------
  deploy:
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Deploy (helm upgrade, gated by --wait)
        run: |
          helm upgrade gateway ./deploy \
            --install \
            --namespace patricia-app \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.push-image.outputs.image_tag }} \
            --wait --timeout 5m

      # Catches "ready but broken": the public health endpoint must answer
      # through ALB -> Gateway directly (Gateway IS the front door, so there's
      # no extra hop the way Auth's smoke check goes through it).
      # If API_BASE_URL is set (ingress wired): check the public path.
      # If not (e.g. the first deploy, before the ingress exists): check the
      # gateway Service in-cluster so CD still passes.
      - name: Smoke check
        run: |
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            echo "Public smoke check via ${{ vars.API_BASE_URL }}"
            for i in $(seq 1 10); do
              curl -sf "${{ vars.API_BASE_URL }}/actuator/health" && exit 0
              sleep 6
            done
            echo "Smoke check failed: ${{ vars.API_BASE_URL }}/actuator/health never answered 2xx"
            exit 1
          else
            echo "API_BASE_URL not set — in-cluster smoke check via the gateway Service"
            kubectl run smoke-gw-$GITHUB_RUN_ID --namespace patricia-app \
              --image=curlimages/curl:8.8.0 --restart=Never --rm -i --quiet \
              --command -- curl -sf --retry 10 --retry-delay 6 --retry-all-errors \
              http://gateway.patricia-app.svc.cluster.local:8080/actuator/health
          fi