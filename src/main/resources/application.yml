server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway

gateway:
  services:
    auth: ${AUTH_SERVICE_URI:http://localhost:8081}
    users: ${USERS_SERVICE_URI:http://localhost:8082}
    parches: ${PARCHES_SERVICE_URI:http://localhost:8083}
    events: ${EVENTS_SERVICE_URI:http://localhost:8087}
    location: ${LOCATION_SERVICE_URI:http://localhost:8089}
    notification: ${NOTIFICATION_SERVICE_URI:http://localhost:8091}
    location-ws: ${LOCATION_WS_URI:ws://localhost:8089}
    notification-ws: ${NOTIFICATION_WS_URI:ws://localhost:8091}
    board: ${BOARD_SERVICE_URI:http://localhost:8086}
    board-ws: ${BOARD_WS_URI:http://localhost:8086}
    parques: ${PARQUES_SERVICE_URI:http://localhost:8085}
    parques-ws: ${PARQUES_WS_URI:http://localhost:8085}
    # NOTA: en K8s cada MS tiene su propio Service DNS, así que compartir el
    # número de puerto 8086 con `board` no es un problema ahí. Pero en local
    # (docker-compose / correr ambos a mano) no levantes Board y Matching al
    # mismo tiempo con estos defaults, o uno pisará al otro en localhost:8086.
    matching: ${MATCHING_SERVICE_URI:http://localhost:8086}
    communication: ${COMMUNICATION_SERVICE_URI:http://localhost:8084}
    # Wellbeing (LLM) comparte el puerto 8086 con board/matching — misma nota
    # de arriba: en K8s no importa (Service DNS propio), en local no los
    # levantes a la vez.
    wellbeing: ${WELLBEING_SERVICE_URI:http://localhost:8086}
    communication-ws: ${COMMUNICATION_WS_URI:ws://localhost:8084}

# Mismo secreto (HS256) que jwt.secret en el Auth Backend.
jwt:
  secret: ${JWT_SECRET}

# Consumido por GatewaySecurityProperties (usado en JwtAuthenticationFilter).
security:
  public-paths:
    - /auth/**
    - /actuator/health
    - /actuator/info
    - /api/games/**
    - /parques-ws/**
    # SockJS: el handshake empieza con un GET /info sin header Authorization ni
    # posibilidad de query token (el filtro solo acepta access_token en upgrades),
    # asi que el board WS pasa como publico igual que parques-ws. El MS de board
    # es quien limita que se puede hacer dentro de la sesion.
    - /ws/board/**

# Orígenes permitidos para CORS (frontend). Coma-separado, env-overridable.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
