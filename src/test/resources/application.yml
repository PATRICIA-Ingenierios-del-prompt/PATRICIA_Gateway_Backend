jwt:
  secret: test-secret-key-with-at-least-32-bytes!!

# Requerido por ServiceUris (prefix: gateway.services) para que RouteConfig
# construya el RouteLocator sin NPE en el contexto de test.
gateway:
  services:
    auth: http://localhost:8081
    users: http://localhost:8082
    parches: http://localhost:8083
    events: http://localhost:8087
    location: http://localhost:8089
    notification: http://localhost:8091
    location-ws: ws://localhost:8089
    notification-ws: ws://localhost:8091
    board: http://localhost:8086
    board-ws: http://localhost:8086

security:
  public-paths:
    - /auth/**
    - /actuator/health
    - /actuator/info

cors:
  allowed-origins: http://localhost:3000
