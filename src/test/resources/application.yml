jwt:
  secret: test-secret-key-with-at-least-32-bytes!!

security:
  public-paths:
    - /auth/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /actuator/health

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/usuarios/**,/api/v1/intereses/**
